name: Daily Digest

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily
  workflow_dispatch:        # allow manual trigger from default branch only
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Defaults to yesterday UTC.'
        required: false
        default: ''

concurrency:
  group: daily-digest
  cancel-in-progress: false  # let an in-progress run finish; queue next

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.6"

      - name: Fetch and process papers
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            uv run python scripts/fetch_papers.py --date "${{ inputs.date }}"
          else
            uv run python scripts/fetch_papers.py
          fi

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "No new papers today, skipping commit."
          else
            git commit -m "chore: daily digest $(date -u +%Y-%m-%d)"
            git push origin main
          fi
